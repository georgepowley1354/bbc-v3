<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm background with soft rounded corners -->
  <rect width="512" height="512" rx="96" fill="#FAF8F5"/>

  <!-- Subtle radial warmth -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#C4896F" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C4896F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Botanical leaf mark — scaled from HavenLogo (original 18x18 units, centered) -->
  <g transform="translate(256, 256) scale(14) translate(-6, -10)">
    <!-- Left leaf half (darker sage) -->
    <path
      d="M6 19 C6 19, -3 10, 6 1 C6 1, 11 10, 6 19Z"
      fill="#4E6B48"
    />
    <!-- Right leaf half (lighter sage) -->
    <path
      d="M6 19 C6 19, 15 10, 6 1 C6 1, 1 10, 6 19Z"
      fill="#7D9B76"
      opacity="0.72"
    />
    <!-- Center vein -->
    <line
      x1="6" y1="1" x2="6" y2="19"
      stroke="#4E6B48"
      stroke-width="0.7"
      stroke-linecap="round"
    />
  </g>
</svg>
